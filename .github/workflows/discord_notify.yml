name: Discord Update Notification

on:
  push:
    branches: [ main ]

jobs:
  discord-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Webhook
        run: |
          curl -H "Content-Type: application/json" \
               -d '{
                 "username": "Albion Market System",
                 "avatar_url": "https://market.majdpro.com/icon.png",
                 "embeds": [{
                   "title": "⚔️ New System Update Applied",
                   "description": "`${{ github.event.head_commit.message }}`",
                   "color": 16096779,
                   "footer": {
                     "text": "Albion Market System • Automated Feed"
                   },
                   "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                 }]
               }' \
               "${{ secrets.DISCORD_WEBHOOK }}"
